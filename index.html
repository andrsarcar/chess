<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Шахматы против Бота</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', 'Arial', sans-serif; touch-action: none; }
        #title {
            position: absolute; top: 15px; left: 0; right: 0; text-align: center;
            color: #c9a96b; font-size: 22px; font-weight: 500; text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            letter-spacing: 4px; z-index: 50; pointer-events: none;
        }
        #crown-icon {
            position: absolute; top: 20px; left: 20px; z-index: 300;
            font-size: 32px; cursor: pointer; opacity: 0.6; transition: 0.2s;
            filter: drop-shadow(0 0 5px gold);
        }
        #crown-icon:hover { opacity: 1; transform: scale(1.1); }
        #secret-panel {
            position: absolute; top: 70px; left: 20px; z-index: 400;
            background: rgba(20,20,40,0.95); padding: 15px; border-radius: 20px;
            border: 2px solid gold; display: none; backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        #secret-input {
            background: #1a1a3e; border: 1px solid gold; color: #ffd700;
            padding: 10px; border-radius: 15px; font-size: 16px; width: 180px;
            text-align: center; outline: none; text-transform: uppercase;
        }
        #secret-btn {
            background: gold; color: #111; border: none; padding: 8px 16px;
            border-radius: 20px; margin-left: 8px; font-weight: bold; cursor: pointer;
        }
        #summon-panel {
            position: absolute; top: 130px; left: 20px; z-index: 400;
            background: rgba(20,20,40,0.95); padding: 10px; border-radius: 20px;
            border: 1px solid gold; display: none; backdrop-filter: blur(10px);
        }
        .summon-btn {
            background: #2a4a6a; color: white; border: none; padding: 8px 12px;
            border-radius: 15px; font-size: 18px; cursor: pointer; margin: 3px;
        }
        #controls {
            position: absolute; bottom: 20px; right: 15px; display: flex; flex-direction: column;
            gap: 8px; z-index: 200;
        }
        .ctrl-row { display: flex; gap: 8px; justify-content: flex-end; }
        .btn {
            background: rgba(35,55,75,0.9); color: #e0d5c0; border: 1px solid #6a8aaa;
            padding: 10px 16px; border-radius: 35px; font-size: 14px; font-weight: bold;
            cursor: pointer; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.15s; min-width: 70px; text-align: center;
        }
        .btn:active { background: #5a8aaa; transform: scale(0.96); }
        .diff-panel {
            display: flex; gap: 5px; background: rgba(25,40,55,0.7); padding: 5px;
            border-radius: 40px; backdrop-filter: blur(5px); flex-wrap: wrap;
        }
        .diff-btn {
            background: transparent; color: #b0c0d0; border: none; padding: 8px 12px;
            border-radius: 30px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .diff-btn.active { background: #c9a96b; color: #111; }
        .diff-btn.insane.active { background: #ff4444; color: white; }
        #musicBtn {
            position: absolute; bottom: 20px; left: 15px; background: rgba(35,55,75,0.9);
            color: #e0d5c0; border: 1px solid #6a8aaa; padding: 10px 18px; border-radius: 35px;
            font-size: 14px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px);
            z-index: 200;
        }
        #promotion-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15,25,35,0.95); padding: 20px; border-radius: 30px;
            display: none; flex-direction: row; gap: 15px; z-index: 300;
            border: 2px solid #c9a96b; backdrop-filter: blur(10px);
        }
        .promo-btn {
            background: #2a4a6a; color: white; border: none; padding: 15px 20px;
            border-radius: 20px; font-size: 24px; font-weight: bold; cursor: pointer;
        }
        #turn-indicator {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(20,30,45,0.7); color: #c9a96b; padding: 6px 20px;
            border-radius: 30px; font-size: 14px; z-index: 100; backdrop-filter: blur(5px);
            border: 1px solid #6a8aaa; pointer-events: none;
        }
        #piece-hint {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #ffd966; padding: 8px 24px;
            border-radius: 30px; font-size: 18px; font-weight: bold; z-index: 400;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
            border: 1px solid #c9a96b; text-transform: uppercase;
        }
        #message-popup {
            position: absolute; top: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(201, 169, 107, 0.9); color: #111; padding: 8px 20px;
            border-radius: 30px; font-size: 16px; font-weight: bold; z-index: 400;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        @media (max-width: 600px) {
            .diff-btn { padding: 6px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="title">♔ ШАХМАТЫ ПРОТИВ БОТА</div>
    
    <div id="crown-icon" title="Секретный код">👑</div>
    <div id="secret-panel">
        <input type="password" id="secret-input" placeholder="КОД" maxlength="20">
        <button id="secret-btn">ВВОД</button>
    </div>
    <div id="summon-panel">
        <button class="summon-btn" data-piece="p">♙</button>
        <button class="summon-btn" data-piece="r">♖</button>
        <button class="summon-btn" data-piece="n">♘</button>
        <button class="summon-btn" data-piece="b">♗</button>
        <button class="summon-btn" data-piece="q">♕</button>
    </div>
    
    <div id="turn-indicator">ХОД БЕЛЫХ</div>
    <div id="piece-hint">♙ ПЕШКА</div>
    <div id="message-popup">👑 КОРОЛЬ ПРИВЁЛ ПОДКРЕПЛЕНИЕ!</div>
    
    <button id="musicBtn">🎵 МУЗЫКА</button>
    
    <div id="promotion-panel">
        <button class="promo-btn" data-promo="q">♕</button>
        <button class="promo-btn" data-promo="r">♖</button>
        <button class="promo-btn" data-promo="b">♗</button>
        <button class="promo-btn" data-promo="n">♘</button>
    </div>

    <div id="controls">
        <div class="ctrl-row">
            <button class="btn" id="newGame">🔄 НОВАЯ</button>
        </div>
        <div class="diff-panel">
            <button class="diff-btn" data-diff="easy">ЛЕГКО</button>
            <button class="diff-btn active" data-diff="medium">СРЕДНЕ</button>
            <button class="diff-btn" data-diff="hard">СЛОЖНО</button>
            <button class="diff-btn insane" data-diff="insane">🔥 БЕЗУМИЕ</button>
        </div>
    </div>

    <script type="importmap">
        {"imports": {"three": "https://unpkg.com/three@0.128.0/build/three.module.js"}}
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== ЗВУКИ ==========
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playMoveSound(isCapture = false, isCastle = false) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.gain.value = isCapture ? 0.4 : (isCastle ? 0.35 : 0.3);
            gain.connect(audioCtx.destination);
            
            if (isCapture) {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = 180;
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (isCastle) {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = 200;
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.2);
            } else {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = 140;
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.08);
            }
        }

        function playCheckSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.25;
            gain.connect(audioCtx.destination);
            
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.connect(gain);
            osc.start(now);
            osc.stop(now + 0.2);
        }

        // ========== СЦЕНА ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2a3a);
        
        const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
        camera.position.set(2.8, 9.0, -2.5);
        camera.lookAt(3.5, 0, 3.5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); 
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x506070, 0.9));
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.0);
        dirLight.position.set(2, 10, 2);
        scene.add(dirLight);

        // ДОСКА: белые и чёрные клетки ПОМЕНЯНЫ МЕСТАМИ
        const darkMat = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.3 }); // Светлые
        const lightMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.4 }); // Тёмные
        const edgeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5 });
        
        const base = new THREE.Mesh(new THREE.BoxGeometry(8.5, 0.15, 8.5), edgeMat);
        base.position.set(4, -0.15, 4);
        scene.add(base);
        
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                // Инвертируем цвет: (i+j)%2 === 0 теперь тёмная, === 1 светлая
                const tile = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.1, 0.98), (i+j)%2 === 0 ? lightMat : darkMat);
                tile.position.set(i + 0.5, 0, j + 0.5);
                scene.add(tile);
            }
        }

        // Подсветка
        const highMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, transparent: true, opacity: 0.5 });
        const attackMat = new THREE.MeshStandardMaterial({ color: 0xff5544, transparent: true, opacity: 0.5 });
        const selMat = new THREE.MeshStandardMaterial({ color: 0xffdd44, transparent: true, opacity: 0.5 });
        const castleMat = new THREE.MeshStandardMaterial({ color: 0x88ff88, transparent: true, opacity: 0.5 });
        const checkMat = new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.6, emissive: new THREE.Color(0x440000) });
        
        const highlights = [];
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                const h = new THREE.Mesh(new THREE.CylinderGeometry(0.46, 0.46, 0.02, 8), highMat.clone());
                h.rotation.x = Math.PI / 2; 
                h.position.set(i + 0.5, 0.17, j + 0.5); 
                h.visible = false;
                scene.add(h); 
                highlights.push({mesh: h, x: i, z: j});
            }
        }

        // ========== ФИГУРЫ ==========
        function createPiece(type, color) {
            const group = new THREE.Group();
            const isW = color === 'w';
            const main = new THREE.MeshStandardMaterial({ color: isW ? 0xf5f0e8 : 0x2a2e35, roughness: 0.3 });
            const acc = new THREE.MeshStandardMaterial({ color: isW ? 0xb0a090 : 0x4a3a2a });
            const met = new THREE.MeshStandardMaterial({ color: isW ? 0xc8b8a0 : 0x5a4a3a });
            
            const add = (g, y, m = main) => { 
                const o = new THREE.Mesh(g, m); 
                o.position.y = y; 
                group.add(o); 
                return o; 
            };
            const yb = 0.22;
            
            if (type === 'p') {
                add(new THREE.CylinderGeometry(0.3, 0.36, 0.18), yb+0.09); 
                add(new THREE.SphereGeometry(0.24, 16), yb+0.42);
                add(new THREE.SphereGeometry(0.16, 12), yb+0.72, acc); 
            } else if (type === 'r') {
                add(new THREE.CylinderGeometry(0.34, 0.4, 0.22), yb+0.11); 
                add(new THREE.CylinderGeometry(0.28, 0.3, 0.55), yb+0.45);
                add(new THREE.CylinderGeometry(0.22, 0.24, 0.18), yb+0.88, acc);
            } else if (type === 'n') {
                add(new THREE.CylinderGeometry(0.32, 0.38, 0.26), yb+0.13);
                const neck = add(new THREE.CylinderGeometry(0.2, 0.22, 0.5), yb+0.6);
                neck.position.set(0.12, 0, 0.06); neck.rotation.z = 0.3;
                add(new THREE.SphereGeometry(0.18, 10), yb+0.95, acc).position.set(0.28, 0, 0.1);
            } else if (type === 'b') {
                add(new THREE.CylinderGeometry(0.32, 0.38, 0.22), yb+0.11); 
                add(new THREE.ConeGeometry(0.28, 0.7, 12), yb+0.58);
                add(new THREE.SphereGeometry(0.16, 10), yb+1.0, acc);
            } else if (type === 'q') {
                add(new THREE.CylinderGeometry(0.36, 0.42, 0.25), yb+0.12); 
                add(new THREE.ConeGeometry(0.3, 0.8, 16), yb+0.62);
                add(new THREE.SphereGeometry(0.18, 12), yb+1.1, acc); 
                const crown = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.04, 8, 20), met);
                crown.rotation.x = Math.PI/2; crown.position.y = yb+1.18; group.add(crown);
            } else if (type === 'k') {
                add(new THREE.CylinderGeometry(0.36, 0.42, 0.27), yb+0.13); 
                add(new THREE.ConeGeometry(0.3, 0.85, 16), yb+0.65);
                add(new THREE.SphereGeometry(0.18, 12), yb+1.15, acc); 
                const cross = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.35, 0.12), met);
                cross.position.y = yb+1.35; group.add(cross);
            }
            return group;
        }

        // ========== ИГРОВАЯ ЛОГИКА ==========
        const pieces = []; 
        const pieceMap = new Map();
        let sel = null, turn = 'w', over = false, thinking = false, diff = 'medium', promoCallback = null;
        let isAnimating = false;
        let secretUnlocked = false;
        
        const pieceNames = { p: 'ПЕШКА', r: 'ЛАДЬЯ', n: 'КОНЬ', b: 'СЛОН', q: 'ФЕРЗЬ', k: 'КОРОЛЬ' };
        const pieceValues = { p: 1, r: 5, n: 3, b: 3, q: 9, k: 100 };
        
        const moveHistory = [];
        
        function showPieceHint(piece) {
            const hint = document.getElementById('piece-hint');
            hint.textContent = `${piece.color==='w'?'БЕЛЫЙ':'ЧЁРНЫЙ'} ${pieceNames[piece.type]}`;
            hint.style.opacity = '1';
            setTimeout(() => hint.style.opacity = '0', 1500);
        }
        
        function showMessage(text) {
            const popup = document.getElementById('message-popup');
            popup.textContent = text;
            popup.style.opacity = '1';
            setTimeout(() => popup.style.opacity = '0', 2000);
        }
        
        function updateTurnIndicator() {
            document.getElementById('turn-indicator').textContent = turn === 'w' ? 'ХОД БЕЛЫХ' : 'ХОД ЧЁРНЫХ (БОТ)';
        }
        
        function getKey(x, z) { return `${x},${z}`; }
        function getPiece(x, z) { return pieceMap.get(getKey(x, z)); }
        
        function updateMap() {
            pieceMap.clear();
            pieces.forEach(p => pieceMap.set(getKey(p.x, p.z), p));
        }
        
        function addPiece(t, c, x, z) {
            if (x < 0 || x > 7 || z < 0 || z > 7) return null;
            if (getPiece(x, z)) return null;
            const m = createPiece(t, c); 
            m.position.set(x+0.5, 0.25, z+0.5); 
            scene.add(m); 
            const piece = {mesh: m, type: t, color: c, x, z, hasMoved: false};
            pieces.push(piece);
            updateMap();
            return piece;
        }
        
        function setupBoard() {
            if (promoCallback) {
                document.getElementById('promotion-panel').style.display = 'none';
                promoCallback = null;
            }
            pieces.forEach(p => scene.remove(p.mesh)); 
            pieces.length = 0;
            moveHistory.length = 0;
            
            // ФЕРЗЬ НА СВОЁМ ЦВЕТЕ: теперь клетки инвертированы, поэтому позиции правильные
            addPiece('r', 'w', 0, 0); addPiece('n', 'w', 1, 0); addPiece('b', 'w', 2, 0); 
            addPiece('q', 'w', 3, 0); addPiece('k', 'w', 4, 0); 
            addPiece('b', 'w', 5, 0); addPiece('n', 'w', 6, 0); addPiece('r', 'w', 7, 0);
            for (let i = 0; i < 8; i++) addPiece('p', 'w', i, 1);
            
            addPiece('r', 'b', 0, 7); addPiece('n', 'b', 1, 7); addPiece('b', 'b', 2, 7); 
            addPiece('q', 'b', 3, 7); addPiece('k', 'b', 4, 7); 
            addPiece('b', 'b', 5, 7); addPiece('n', 'b', 6, 7); addPiece('r', 'b', 7, 7);
            for (let i = 0; i < 8; i++) addPiece('p', 'b', i, 6);
            
            updateMap(); 
            turn = 'w'; over = false; thinking = false; sel = null; 
            clearHighlights(); updateTurnIndicator(); isAnimating = false;
            updateCheckHighlight();
        }

        function isValidMove(p, tx, tz) {
            if (tx < 0 || tx > 7 || tz < 0 || tz > 7) return false;
            const t = getPiece(tx, tz); 
            if (t && t.color === p.color) return false;
            const dx = tx - p.x, dz = tz - p.z, adx = Math.abs(dx), adz = Math.abs(dz);
            if (p.type === 'p') {
                const dir = p.color === 'w' ? 1 : -1;
                if (dx === 0 && dz === dir && !t) return true;
                if (dx === 0 && dz === 2*dir && ((p.color==='w'&&p.z===1)||(p.color==='b'&&p.z===6)) && !t && !getPiece(p.x, p.z+dir)) return true;
                if (adx === 1 && dz === dir && t) return true;
                return false;
            }
            if (p.type === 'r') return (dx===0 || dz===0) && !pieceBetween(p.x, p.z, tx, tz);
            if (p.type === 'n') return (adx===2&&adz===1) || (adx===1&&adz===2);
            if (p.type === 'b') return adx===adz && !pieceBetween(p.x, p.z, tx, tz);
            if (p.type === 'q') return (dx===0||dz===0||adx===adz) && !pieceBetween(p.x, p.z, tx, tz);
            if (p.type === 'k') {
                if (adx <= 1 && adz <= 1) return true;
                if (!p.hasMoved && adx === 2 && dz === 0 && !inCheck(p.color)) {
                    const row = p.z;
                    const isKingSide = tx > p.x;
                    const rookX = isKingSide ? 7 : 0;
                    const rook = getPiece(rookX, row);
                    if (!rook || rook.type !== 'r' || rook.hasMoved) return false;
                    const step = isKingSide ? 1 : -1;
                    for (let x = p.x + step; x !== rookX; x += step) if (getPiece(x, row)) return false;
                    if (wouldLeaveCheck(p, p.x + step, row)) return false;
                    return true;
                }
                return false;
            }
            return false;
        }
        
        function pieceBetween(x1, z1, x2, z2) {
            const dx = Math.sign(x2-x1), dz = Math.sign(z2-z1); 
            let x = x1+dx, z = z1+dz;
            while (x !== x2 || z !== z2) { 
                if (getPiece(x, z)) return true; 
                x += dx; z += dz; 
            }
            return false;
        }
        
        function inCheck(c) {
            const k = pieces.find(p => p.type==='k' && p.color===c); 
            return !k || pieces.some(p => p.color!==c && isValidMove(p, k.x, k.z));
        }
        
        function wouldLeaveCheck(p, tx, tz) {
            const cap = getPiece(tx, tz); 
            if (cap) { scene.remove(cap.mesh); pieces.splice(pieces.indexOf(cap),1); updateMap(); }
            const ox = p.x, oz = p.z; 
            p.x = tx; p.z = tz; updateMap(); 
            const chk = inCheck(p.color);
            p.x = ox; p.z = oz; 
            if (cap) { pieces.push(cap); scene.add(cap.mesh); } 
            updateMap(); 
            return chk;
        }
        
        function clearHighlights() { 
            highlights.forEach(h => h.mesh.visible = false); 
        }
        
        function updateCheckHighlight() {
            const whiteKing = pieces.find(p => p.type === 'k' && p.color === 'w');
            const blackKing = pieces.find(p => p.type === 'k' && p.color === 'b');
            
            if (whiteKing && inCheck('w')) {
                const h = highlights.find(h => h.x === whiteKing.x && h.z === whiteKing.z);
                if (h) { h.mesh.material = checkMat; h.mesh.visible = true; }
                playCheckSound();
            }
            if (blackKing && inCheck('b')) {
                const h = highlights.find(h => h.x === blackKing.x && h.z === blackKing.z);
                if (h) { h.mesh.material = checkMat; h.mesh.visible = true; }
            }
        }
        
        function showMoves(p) {
            clearHighlights(); 
            const s = highlights.find(h => h.x === p.x && h.z === p.z);
            if (s) { s.mesh.material = selMat; s.mesh.visible = true; }
            highlights.forEach(h => {
                if (isValidMove(p, h.x, h.z) && !wouldLeaveCheck(p, h.x, h.z)) {
                    h.mesh.visible = true; 
                    if (p.type === 'k' && Math.abs(h.x - p.x) === 2) h.mesh.material = castleMat;
                    else h.mesh.material = getPiece(h.x, h.z) ? attackMat : highMat;
                }
            });
            updateCheckHighlight();
        }
        
        function animateMove(p, toX, toZ, isCastle = false, rookMove = null, onComplete) {
            isAnimating = true;
            const startPos = p.mesh.position.clone();
            const endPos = new THREE.Vector3(toX + 0.5, 0.25, toZ + 0.5);
            const duration = 200;
            const startTime = performance.now();
            
            playMoveSound(false, isCastle);
            
            function animate() {
                const now = performance.now();
                const progress = Math.min((now - startTime) / duration, 1);
                const current = startPos.clone().lerp(endPos, progress);
                current.y += Math.sin(progress * Math.PI) * 0.1;
                p.mesh.position.copy(current);
                
                if (progress < 1) requestAnimationFrame(animate);
                else { p.mesh.position.copy(endPos); isAnimating = false; if (onComplete) onComplete(); }
            }
            
            if (rookMove) {
                const rook = rookMove.piece;
                const rStart = rook.mesh.position.clone();
                const rEnd = new THREE.Vector3(rookMove.toX + 0.5, 0.25, rookMove.toZ + 0.5);
                function animateRook() {
                    const now = performance.now();
                    const progress = Math.min((now - startTime) / duration, 1);
                    const current = rStart.clone().lerp(rEnd, progress);
                    current.y += Math.sin(progress * Math.PI) * 0.1;
                    rook.mesh.position.copy(current);
                    if (progress < 1) requestAnimationFrame(animateRook);
                }
                requestAnimationFrame(animateRook);
            }
            
            requestAnimationFrame(animate);
        }

        function promotePawn(p, endTurn) {
            const panel = document.getElementById('promotion-panel');
            panel.style.display = 'flex';
            const timeout = setTimeout(() => { if (promoCallback) promoCallback('q'); }, 5000);
            
            promoCallback = (type) => {
                clearTimeout(timeout);
                panel.style.display = 'none';
                scene.remove(p.mesh);
                const idx = pieces.indexOf(p);
                const newMesh = createPiece(type, p.color);
                newMesh.position.set(p.x+0.5, 0.25, p.z+0.5);
                scene.add(newMesh);
                pieces[idx] = { mesh: newMesh, type, color: p.color, x: p.x, z: p.z, hasMoved: true };
                updateMap();
                promoCallback = null;
                if (endTurn) endTurn();
            };
        }

        function executeMove(p, tx, tz, endCallback) {
            const captured = getPiece(tx, tz);
            let isCastle = false, rookMove = null;
            
            moveHistory.push({ piece: p.type, from: {x: p.x, z: p.z}, to: {x: tx, z: tz}, captured: captured?.type });
            if (moveHistory.length > 20) moveHistory.shift();
            
            if (p.type === 'k' && Math.abs(tx - p.x) === 2) {
                isCastle = true;
                const row = p.z;
                const isKingSide = tx > p.x;
                const rookX = isKingSide ? 7 : 0;
                const rook = getPiece(rookX, row);
                if (rook) {
                    rookMove = { piece: rook, toX: isKingSide ? tx - 1 : tx + 1, toZ: row };
                    rook.x = rookMove.toX; rook.hasMoved = true;
                }
            }
            
            if (captured) { scene.remove(captured.mesh); pieces.splice(pieces.indexOf(captured),1); }
            if (p.type === 'k') p.hasMoved = true;
            if (p.type === 'r') p.hasMoved = true;
            
            p.x = tx; p.z = tz; updateMap(); clearHighlights();
            
            animateMove(p, tx, tz, isCastle, rookMove, () => {
                if (p.type === 'p' && (p.z === 0 || p.z === 7)) { promotePawn(p, endCallback); return; }
                if (p.type === 'k') {
                    const enemyEdge = p.color === 'w' ? 7 : 0;
                    if (p.z === enemyEdge) {
                        const homeRow = p.color === 'w' ? 0 : 7;
                        for (let offset = 0; offset < 8; offset++) {
                            const checkX = (p.x + offset) % 8;
                            if (!getPiece(checkX, homeRow)) {
                                addPiece('p', p.color, checkX, homeRow);
                                showMessage(`👑 ${p.color==='w'?'БЕЛЫЙ':'ЧЁРНЫЙ'} КОРОЛЬ ПРИВЁЛ ПОДКРЕПЛЕНИЕ!`);
                                break;
                            }
                        }
                    }
                }
                updateCheckHighlight();
                if (endCallback) endCallback();
            });
        }

        function getLegalMoves(c) {
            const m = []; 
            pieces.filter(p => p.color===c).forEach(p => {
                for (let x=0; x<8; x++) for (let z=0; z<8; z++) 
                    if (isValidMove(p, x, z) && !wouldLeaveCheck(p, x, z)) m.push({piece: p, x, z});
            });
            return m;
        }
        
        function evaluatePosition() {
            let score = 0;
            pieces.forEach(p => {
                const val = pieceValues[p.type] || 0;
                score += p.color === 'b' ? val : -val;
            });
            pieces.filter(p => p.color === 'b').forEach(p => {
                const dx = Math.abs(p.x - 3.5), dz = Math.abs(p.z - 3.5);
                if (dx < 2 && dz < 2) score += 0.3;
                if (p.type === 'n' || p.type === 'b') { if (p.z !== 7) score += 0.2; }
                if (p.type === 'k') { if (p.x >= 2 && p.x <= 5) score += 0.5; }
            });
            if (moveHistory.length >= 4) {
                const last4 = moveHistory.slice(-4);
                if (last4[0]?.piece === last4[2]?.piece && 
                    last4[0]?.from.x === last4[2]?.to.x && 
                    last4[0]?.from.z === last4[2]?.to.z) score -= 2;
            }
            return score;
        }
        
        function isPieceAttacked(piece) {
            return pieces.some(p => p.color !== piece.color && isValidMove(p, piece.x, piece.z));
        }
        
        function minimax(depth, alpha, beta, maximizing) {
            if (depth === 0) return evaluatePosition();
            const moves = getLegalMoves(maximizing ? 'b' : 'w');
            if (moves.length === 0) {
                if (inCheck(maximizing ? 'b' : 'w')) return maximizing ? -1000 + depth : 1000 - depth;
                return 0;
            }
            moves.sort((a, b) => {
                const aCapture = getPiece(a.x, a.z);
                const bCapture = getPiece(b.x, b.z);
                return (bCapture ? pieceValues[bCapture.type] : 0) - (aCapture ? pieceValues[aCapture.type] : 0);
            });
            
            if (maximizing) {
                let maxEval = -Infinity;
                for (const move of moves) {
                    const captured = getPiece(move.x, move.z);
                    if (captured) { scene.remove(captured.mesh); pieces.splice(pieces.indexOf(captured),1); updateMap(); }
                    const ox = move.piece.x, oz = move.piece.z;
                    const oldHasMoved = move.piece.hasMoved;
                    move.piece.x = move.x; move.piece.z = move.z; move.piece.hasMoved = true; updateMap();
                    const evalScore = minimax(depth - 1, alpha, beta, false);
                    move.piece.x = ox; move.piece.z = oz; move.piece.hasMoved = oldHasMoved;
                    if (captured) { pieces.push(captured); scene.add(captured.mesh); }
                    updateMap();
                    maxEval = Math.max(maxEval, evalScore);
                    alpha = Math.max(alpha, evalScore);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (const move of moves) {
                    const captured = getPiece(move.x, move.z);
                    if (captured) { scene.remove(captured.mesh); pieces.splice(pieces.indexOf(captured),1); updateMap(); }
                    const ox = move.piece.x, oz = move.piece.z;
                    const oldHasMoved = move.piece.hasMoved;
                    move.piece.x = move.x; move.piece.z = move.z; move.piece.hasMoved = true; updateMap();
                    const evalScore = minimax(depth - 1, alpha, beta, true);
                    move.piece.x = ox; move.piece.z = oz; move.piece.hasMoved = oldHasMoved;
                    if (captured) { pieces.push(captured); scene.add(captured.mesh); }
                    updateMap();
                    minEval = Math.min(minEval, evalScore);
                    beta = Math.min(beta, evalScore);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }
        
        function checkGameOver() {
            const m = getLegalMoves(turn); 
            if (m.length === 0) {
                over = true;
                document.getElementById('turn-indicator').textContent = inCheck(turn) ? 
                    `МАТ! ПОБЕДИЛИ ${turn==='w'?'ЧЁРНЫЕ':'БЕЛЫЕ'}` : `ПАТ! НИЧЬЯ`;
                return true;
            }
            return false;
        }
        
        function botMove() {
            if (over || turn !== 'b' || thinking || isAnimating) return;
            thinking = true;
            setTimeout(() => {
                if (over || turn !== 'b' || isAnimating) { thinking = false; return; }
                const moves = getLegalMoves('b'); 
                if (moves.length === 0) { checkGameOver(); thinking = false; return; }
                let mv; 
                
                if (diff === 'easy') {
                    const safeMoves = moves.filter(m => {
                        const target = getPiece(m.x, m.z);
                        return !(target && pieceValues[target.type] > pieceValues[m.piece.type]);
                    });
                    mv = safeMoves.length ? safeMoves[Math.floor(Math.random() * safeMoves.length)] : moves[Math.floor(Math.random() * moves.length)];
                } else if (diff === 'medium') {
                    const caps = moves.filter(m => {
                        const target = getPiece(m.x, m.z);
                        return target && pieceValues[target.type] >= pieceValues[m.piece.type];
                    });
                    if (caps.length) {
                        mv = caps.sort((a,b) => pieceValues[getPiece(b.x,b.z).type] - pieceValues[getPiece(a.x,a.z).type])[0];
                    } else {
                        const devMoves = moves.filter(m => {
                            if (m.piece.type === 'p' && m.piece.z > 4) return true;
                            if ((m.piece.type === 'n' || m.piece.type === 'b') && Math.abs(m.x - 3.5) < 2.5) return true;
                            return false;
                        });
                        mv = devMoves.length ? devMoves[Math.floor(Math.random() * devMoves.length)] : moves[Math.floor(Math.random() * moves.length)];
                    }
                } else if (diff === 'hard') {
                    let bestScore = -Infinity;
                    for (const move of moves) {
                        let score = 0;
                        const target = getPiece(move.x, move.z);
                        if (target) score += pieceValues[target.type] * 10;
                        const oldX = move.piece.x, oldZ = move.piece.z;
                        move.piece.x = move.x; move.piece.z = move.z; updateMap();
                        if (isPieceAttacked(move.piece)) score -= pieceValues[move.piece.type] * 5;
                        move.piece.x = oldX; move.piece.z = oldZ; updateMap();
                        if (move.piece.type === 'p' && move.z < 5) score += 1;
                        if ((move.piece.type === 'n' || move.piece.type === 'b') && Math.abs(move.x - 3.5) < 2.5) score += 2;
                        const lastMove = moveHistory[moveHistory.length - 1];
                        if (lastMove && lastMove.piece === move.piece.type && lastMove.to.x === move.piece.x && lastMove.to.z === move.piece.z) score -= 5;
                        if (score > bestScore) { bestScore = score; mv = move; }
                    }
                } else {
                    let bestScore = -Infinity;
                    for (const move of moves) {
                        const captured = getPiece(move.x, move.z);
                        if (captured) { scene.remove(captured.mesh); pieces.splice(pieces.indexOf(captured),1); updateMap(); }
                        const ox = move.piece.x, oz = move.piece.z;
                        const oldHasMoved = move.piece.hasMoved;
                        move.piece.x = move.x; move.piece.z = move.z; move.piece.hasMoved = true; updateMap();
                        const score = minimax(2, -Infinity, Infinity, false);
                        move.piece.x = ox; move.piece.z = oz; move.piece.hasMoved = oldHasMoved;
                        if (captured) { pieces.push(captured); scene.add(captured.mesh); }
                        updateMap();
                        if (score > bestScore) { bestScore = score; mv = move; }
                    }
                }
                
                executeMove(mv.piece, mv.x, mv.z, () => {
                    thinking = false; turn = 'w'; updateTurnIndicator(); 
                    updateCheckHighlight(); checkGameOver();
                });
            }, diff === 'insane' ? 500 : 300);
        }

        // ========== КЛИКИ (ИСПРАВЛЕНО ДЛЯ ТЕЛЕФОНА) ==========
        const raycaster = new THREE.Raycaster(); 
        const mouse = new THREE.Vector2();
        
        function handleClick(e) {
            if (over || turn !== 'w' || thinking || isAnimating || promoCallback) return;
            
            // Предотвращаем стандартное поведение
            e.preventDefault();
            
            // Получаем координаты касания/клика
            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = e.clientX !== undefined ? e.clientX : (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY !== undefined ? e.clientY : (e.touches ? e.touches[0].clientY : 0);
            
            // Нормализуем координаты
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            if (sel) {
                const plane = new THREE.Plane(new THREE.Vector3(0,1,0), -0.25); 
                const target = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(plane, target)) {
                    const x = Math.floor(target.x), z = Math.floor(target.z);
                    if (x>=0 && x<8 && z>=0 && z<8 && isValidMove(sel, x, z) && !wouldLeaveCheck(sel, x, z)) {
                        executeMove(sel, x, z, () => {
                            sel = null; turn = 'b'; updateTurnIndicator(); 
                            updateCheckHighlight(); if (!checkGameOver()) botMove();
                        }); 
                        return;
                    } else { sel = null; clearHighlights(); }
                }
            }
            
            const meshes = pieces.map(p => p.mesh); 
            const intersects = raycaster.intersectObjects(meshes, true);
            if (intersects.length) {
                const hit = intersects[0].object; 
                const p = pieces.find(p => p.mesh === hit || p.mesh.children.includes(hit)); 
                if (p && p.color === 'w') { sel = p; showMoves(p); showPieceHint(p); }
            } else { sel = null; clearHighlights(); }
        }
        
        renderer.domElement.addEventListener('click', handleClick);
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
        }, {passive: false});
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            if (touch) {
                // Создаём объект события с координатами касания
                handleClick({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} });
            }
        });

        // ========== СЕКРЕТНЫЙ КОД ==========
        const crown = document.getElementById('crown-icon');
        const secretPanel = document.getElementById('secret-panel');
        const summonPanel = document.getElementById('summon-panel');
        const secretInput = document.getElementById('secret-input');
        const secretBtn = document.getElementById('secret-btn');
        
        crown.addEventListener('click', () => {
            secretPanel.style.display = secretPanel.style.display === 'none' ? 'block' : 'none';
        });
        
        secretBtn.addEventListener('click', () => {
            if (secretInput.value.toUpperCase() === 'ANDR14CHESS') {
                secretUnlocked = true;
                summonPanel.style.display = 'flex';
                secretPanel.style.display = 'none';
                showMessage('✨ СЕКРЕТНЫЙ РЕЖИМ АКТИВИРОВАН! ✨');
                crown.style.filter = 'drop-shadow(0 0 15px gold)';
            } else {
                showMessage('❌ НЕВЕРНЫЙ КОД');
            }
        });
        
        document.querySelectorAll('.summon-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!secretUnlocked) return;
                const piece = btn.dataset.piece;
                const homeRow = turn === 'w' ? [0, 1] : [6, 7];
                for (let attempt = 0; attempt < 20; attempt++) {
                    const x = Math.floor(Math.random() * 8);
                    const z = homeRow[Math.floor(Math.random() * homeRow.length)];
                    if (!getPiece(x, z)) {
                        addPiece(piece, turn, x, z);
                        showMessage(`✨ ПРИЗВАН: ${pieceNames[piece]}`);
                        break;
                    }
                }
            });
        });

        document.querySelectorAll('.promo-btn').forEach(b => b.addEventListener('click', () => { 
            if (promoCallback) promoCallback(b.dataset.promo); 
        }));
        document.getElementById('newGame').addEventListener('click', () => { if (!isAnimating) setupBoard(); });
        document.querySelectorAll('.diff-btn').forEach(b => b.addEventListener('click', () => { 
            document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active')); 
            b.classList.add('active'); diff = b.dataset.diff; setupBoard(); 
        }));
        
        // ========== МУЗЫКА ==========
        let musicOn = false, musicCtx = null;
        function initMusic() {
            if (musicCtx) return;
            musicCtx = new (window.AudioContext || window.webkitAudioContext)();
            const gain = musicCtx.createGain(); gain.gain.value = 0.3; gain.connect(musicCtx.destination);
            function note(f, t, d) {
                if (!musicOn) return; 
                const o = musicCtx.createOscillator(), g = musicCtx.createGain(); 
                o.type = 'triangle'; o.frequency.value = f; 
                g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t+d); 
                o.connect(g); g.connect(gain); o.start(t); o.stop(t+d);
            }
            function loop() {
                if (!musicOn) return; 
                const t = musicCtx.currentTime; 
                [261.63, 329.63, 392.00, 523.25].forEach((f, i) => {
                    note(f, t + i*0.6, 0.5); 
                    if (i%2) note(f*1.5, t + i*0.6 + 0.1, 0.2);
                }); 
                setTimeout(loop, 3000);
            }
            loop();
        }
        document.getElementById('musicBtn').addEventListener('click', () => {
            musicOn = !musicOn;
            document.getElementById('musicBtn').textContent = musicOn ? '🔇 ВЫКЛ' : '🎵 ВКЛ';
            if (musicOn) { if (!musicCtx) initMusic(); else musicCtx.resume(); }
        });

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
        
        function animate() {
            requestAnimationFrame(animate); 
            renderer.render(scene, camera);
        }
        
        setupBoard(); 
        animate();
    </script>
</body>
